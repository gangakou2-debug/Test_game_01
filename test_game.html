<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🧱 ブロック崩しゲーム</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      letter-spacing: 4px;
      text-shadow: 0 0 20px #a78bfa;
      color: #c4b5fd;
    }

    #info {
      display: flex;
      gap: 40px;
      margin-bottom: 12px;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    #info span {
      background: rgba(255,255,255,0.08);
      padding: 4px 18px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    #info span b {
      color: #a78bfa;
    }

    canvas {
      background: rgba(0, 0, 0, 0.45);
      border: 2px solid rgba(167, 139, 250, 0.4);
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.4);
      display: block;
    }

    #message {
      margin-top: 16px;
      font-size: 1.1rem;
      color: #c4b5fd;
      letter-spacing: 2px;
      min-height: 28px;
      text-shadow: 0 0 10px #a78bfa;
    }

    #startBtn {
      margin-top: 14px;
      padding: 10px 36px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 2px;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.5);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    #startBtn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 28px rgba(124, 58, 237, 0.8);
    }

    #controls {
      margin-top: 12px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <h1>🧱 ブロック崩し</h1>

  <div id="info">
    <span>スコア: <b id="scoreVal">0</b></span>
    <span>ライフ: <b id="livesVal">3</b></span>
    <span>レベル: <b id="levelVal">1</b></span>
  </div>

  <canvas id="gameCanvas" width="480" height="400"></canvas>

  <div id="message"></div>
  <button id="startBtn">▶ スタート</button>
  <div id="controls">← → キー または マウスでパドルを操作</div>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('scoreVal');
  const livesEl = document.getElementById('livesVal');
  const levelEl = document.getElementById('levelVal');
  const messageEl = document.getElementById('message');
  const startBtn = document.getElementById('startBtn');

  // ── 定数 ──────────────────────────────
  const PADDLE_W = 90, PADDLE_H = 12, PADDLE_Y = canvas.height - 30;
  const BALL_R = 8;
  const BRICK_ROWS = 5, BRICK_COLS = 9;
  const BRICK_W = 44, BRICK_H = 18, BRICK_PAD = 6, BRICK_TOP = 40;

  const BRICK_COLORS = [
    ['#f87171','#ef4444'],
    ['#fb923c','#f97316'],
    ['#facc15','#eab308'],
    ['#4ade80','#22c55e'],
    ['#60a5fa','#3b82f6'],
  ];

  // ── 状態変数 ──────────────────────────
  let score, lives, level, gameRunning, animId;
  let paddleX, ballX, ballY, ballDX, ballDY;
  let bricks = [];
  let keys = {};
  let mouseX = canvas.width / 2;

  // ── 初期化 ────────────────────────────
  function init(lv = 1) {
    level = lv;
    score = lv === 1 ? 0 : score;
    lives = lv === 1 ? 3 : lives;
    levelEl.textContent = level;
    scoreEl.textContent = score;
    livesEl.textContent = lives;

    paddleX = canvas.width / 2 - PADDLE_W / 2;

    const speed = 3 + (level - 1) * 0.6;
    const angle = (Math.random() * 60 + 30) * (Math.PI / 180);
    ballX = canvas.width / 2;
    ballY = PADDLE_Y - BALL_R - 2;
    ballDX = speed * Math.cos(angle) * (Math.random() < 0.5 ? 1 : -1);
    ballDY = -speed * Math.sin(angle);

    // ブロック生成
    bricks = [];
    for (let r = 0; r < BRICK_ROWS; r++) {
      for (let c = 0; c < BRICK_COLS; c++) {
        const bx = c * (BRICK_W + BRICK_PAD) + BRICK_PAD + 8;
        const by = r * (BRICK_H + BRICK_PAD) + BRICK_TOP;
        bricks.push({ x: bx, y: by, alive: true, row: r });
      }
    }

    messageEl.textContent = '';
    gameRunning = true;
  }

  // ── 描画 ──────────────────────────────
  function drawBricks() {
    bricks.forEach(b => {
      if (!b.alive) return;
      const [light, dark] = BRICK_COLORS[b.row];
      const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + BRICK_H);
      grad.addColorStop(0, light);
      grad.addColorStop(1, dark);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(b.x, b.y, BRICK_W, BRICK_H, 4);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 1;
      ctx.stroke();
    });
  }

  function drawPaddle() {
    const grad = ctx.createLinearGradient(paddleX, PADDLE_Y, paddleX + PADDLE_W, PADDLE_Y);
    grad.addColorStop(0, '#7c3aed');
    grad.addColorStop(0.5, '#a78bfa');
    grad.addColorStop(1, '#7c3aed');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(paddleX, PADDLE_Y, PADDLE_W, PADDLE_H, 6);
    ctx.fill();
    ctx.shadowColor = '#a78bfa';
    ctx.shadowBlur = 12;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function drawBall() {
    const grad = ctx.createRadialGradient(ballX - 2, ballY - 2, 1, ballX, ballY, BALL_R);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.5, '#c4b5fd');
    grad.addColorStop(1, '#7c3aed');
    ctx.beginPath();
    ctx.arc(ballX, ballY, BALL_R, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.shadowColor = '#a78bfa';
    ctx.shadowBlur = 14;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function drawBackground() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  // ── 衝突判定 ──────────────────────────
  function checkBrickCollision() {
    for (let b of bricks) {
      if (!b.alive) continue;
      if (
        ballX + BALL_R > b.x &&
        ballX - BALL_R < b.x + BRICK_W &&
        ballY + BALL_R > b.y &&
        ballY - BALL_R < b.y + BRICK_H
      ) {
        b.alive = false;
        score += (BRICK_ROWS - b.row) * 10;
        scoreEl.textContent = score;

        // どの面に当たったか
        const overlapLeft  = (ballX + BALL_R) - b.x;
        const overlapRight = (b.x + BRICK_W) - (ballX - BALL_R);
        const overlapTop   = (ballY + BALL_R) - b.y;
        const overlapBot   = (b.y + BRICK_H) - (ballY - BALL_R);
        const minH = Math.min(overlapLeft, overlapRight);
        const minV = Math.min(overlapTop, overlapBot);
        if (minH < minV) ballDX = -ballDX;
        else             ballDY = -ballDY;

        return;
      }
    }
  }

  // ── ゲームループ ──────────────────────
  function loop() {
    if (!gameRunning) return;

    drawBackground();
    drawBricks();
    drawPaddle();
    drawBall();

    // パドル操作（キーボード）
    const speed = 7;
    if (keys['ArrowLeft']  && paddleX > 0)
      paddleX = Math.max(0, paddleX - speed);
    if (keys['ArrowRight'] && paddleX < canvas.width - PADDLE_W)
      paddleX = Math.min(canvas.width - PADDLE_W, paddleX + speed);

    // マウス操作
    paddleX = Math.max(0, Math.min(canvas.width - PADDLE_W, mouseX - PADDLE_W / 2));

    // ボール移動
    ballX += ballDX;
    ballY += ballDY;

    // 壁反射
    if (ballX - BALL_R <= 0)              { ballX = BALL_R;                    ballDX = Math.abs(ballDX); }
    if (ballX + BALL_R >= canvas.width)   { ballX = canvas.width - BALL_R;     ballDX = -Math.abs(ballDX); }
    if (ballY - BALL_R <= 0)              { ballY = BALL_R;                    ballDY = Math.abs(ballDY); }

    // パドル衝突
    if (
      ballY + BALL_R >= PADDLE_Y &&
      ballY + BALL_R <= PADDLE_Y + PADDLE_H &&
      ballX > paddleX &&
      ballX < paddleX + PADDLE_W
    ) {
      ballDY = -Math.abs(ballDY);
      // 当たった位置でX速度を変える
      const hit = (ballX - (paddleX + PADDLE_W / 2)) / (PADDLE_W / 2);
      ballDX = hit * 5;
    }

    // ブロック衝突
    checkBrickCollision();

    // ミス（ボールが下に落ちた）
    if (ballY - BALL_R > canvas.height) {
      lives--;
      livesEl.textContent = lives;
      if (lives <= 0) {
        gameRunning = false;
        messageEl.textContent = '💀 ゲームオーバー！';
        startBtn.textContent = '🔄 もう一度';
        startBtn.style.display = 'inline-block';
        return;
      }
      // リセット（ライフ消費）
      const spd = Math.sqrt(ballDX * ballDX + ballDY * ballDY);
      ballX = canvas.width / 2;
      ballY = PADDLE_Y - BALL_R - 2;
      ballDY = -spd;
      ballDX = spd * (Math.random() < 0.5 ? 1 : -1);
    }

    // クリア判定
    if (bricks.every(b => !b.alive)) {
      gameRunning = false;
      messageEl.textContent = `🎉 レベル ${level} クリア！`;
      startBtn.textContent = `▶ レベル ${level + 1} へ`;
      startBtn.dataset.nextLevel = level + 1;
      startBtn.style.display = 'inline-block';
      return;
    }

    animId = requestAnimationFrame(loop);
  }

  // ── イベント ──────────────────────────
  document.addEventListener('keydown', e => { keys[e.key] = true; });
  document.addEventListener('keyup',   e => { keys[e.key] = false; });

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
  });

  // タッチ操作（スマホ対応）
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    mouseX = e.touches[0].clientX - rect.left;
  }, { passive: false });

  startBtn.addEventListener('click', () => {
    cancelAnimationFrame(animId);
    const nextLevel = parseInt(startBtn.dataset.nextLevel || '1');
    startBtn.textContent = '▶ スタート';
    startBtn.dataset.nextLevel = '1';
    startBtn.style.display = 'none';
    if (nextLevel === 1 || messageEl.textContent.includes('ゲームオーバー')) {
      init(1);
    } else {
      init(nextLevel);
    }
    animId = requestAnimationFrame(loop);
  });

  // 初期画面描画
  drawBackground();
  drawBricks.call({ call: () => {
    bricks = [];
    for (let r = 0; r < BRICK_ROWS; r++)
      for (let c = 0; c < BRICK_COLS; c++) {
        const bx = c * (BRICK_W + BRICK_PAD) + BRICK_PAD + 8;
        const by = r * (BRICK_H + BRICK_PAD) + BRICK_TOP;
        bricks.push({ x: bx, y: by, alive: true, row: r });
      }
  }});
  // タイトル表示用の仮ブロック描画
  (() => {
    bricks = [];
    for (let r = 0; r < BRICK_ROWS; r++)
      for (let c = 0; c < BRICK_COLS; c++) {
        const bx = c * (BRICK_W + BRICK_PAD) + BRICK_PAD + 8;
        const by = r * (BRICK_H + BRICK_PAD) + BRICK_TOP;
        bricks.push({ x: bx, y: by, alive: true, row: r });
      }
    drawBricks();
  })();
</script>
</body>
</html>
